name: Deploy App (dev)

on:
  push:
    branches:
      - dev
    paths:
      - "lib/**"
      - "android/**"
      - "ios/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/deploy-dev.yml"

permissions:
  contents: read

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android-dev:
    name: Build & Distribute Android (dev)
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write dev env file
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: printf '%s' "$ENV_DEV" > .env.dev

      - name: Write prod env file
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: printf '%s' "$ENV_PROD" > .env

      - name: Write firebase_options_dev.dart
        env:
          FIREBASE_OPTIONS_DEV: ${{ secrets.FIREBASE_OPTIONS_DEV }}
        run: printf '%s' "$FIREBASE_OPTIONS_DEV" > lib/firebase_options_dev.dart

      - name: Write firebase_options_prod.dart
        env:
          FIREBASE_OPTIONS_PROD: ${{ secrets.FIREBASE_OPTIONS_PROD }}
        run: printf '%s' "$FIREBASE_OPTIONS_PROD" > lib/firebase_options_prod.dart

      - name: Write google-services.json (dev)
        env:
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON_DEV" > android/app/src/dev/google-services.json

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore
          echo "ANDROID_KEYSTORE_PATH=/tmp/release.keystore" >> "$GITHUB_ENV"

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build AAB (dev release)
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle \
            --release \
            --flavor dev \
            --target lib/main_dev.dart

      - name: Install Ruby dependencies
        run: bundle install

      - name: Distribute to Firebase App Distribution
        env:
          FIREBASE_APP_ID_DEV: ${{ secrets.FIREBASE_APP_ID_DEV }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GOOGLE_PLAY_JSON_KEY_PATH: /tmp/play_key.json
        run: bundle exec fastlane android beta_dev

  build-ios-dev:
    name: Build & Distribute iOS (dev)
    runs-on: macos-14
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write dev env file
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: printf '%s' "$ENV_DEV" > .env.dev

      - name: Write prod env file
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: printf '%s' "$ENV_PROD" > .env

      - name: Write firebase_options_dev.dart
        env:
          FIREBASE_OPTIONS_DEV: ${{ secrets.FIREBASE_OPTIONS_DEV }}
        run: printf '%s' "$FIREBASE_OPTIONS_DEV" > lib/firebase_options_dev.dart

      - name: Write firebase_options_prod.dart
        env:
          FIREBASE_OPTIONS_PROD: ${{ secrets.FIREBASE_OPTIONS_PROD }}
        run: printf '%s' "$FIREBASE_OPTIONS_PROD" > lib/firebase_options_prod.dart

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Install Ruby dependencies
        run: bundle install

      - name: Set up App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" > /tmp/api_key.p8

      - name: Build & upload to TestFlight (dev)
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: /tmp/api_key.p8
        run: bundle exec fastlane ios beta_dev
