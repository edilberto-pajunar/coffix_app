name: Deploy Functions (prod)

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-prod-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-prod-functions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix functions

      - name: Type-check
        run: npx --prefix functions tsc --noEmit

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Write prod .env
        env:
          FUNCTIONS_ENV: ${{ secrets.FUNCTIONS_ENV_PROD }}
        run: printf '%s' "$FUNCTIONS_ENV" > functions/.env

      - name: Write prod service account key
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
        run: |
          printf '%s' "$FIREBASE_SA" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy functions to prod
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
        run: firebase deploy --only functions --project coffix-app-prod --non-interactive
