name: Deploy Functions (dev)

on:
  workflow_run:
    workflows: ["CI"]
    branches: [dev]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dev-functions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Check for functions changes
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect functions changes
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD^ HEAD | grep -q '^functions/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to dev
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix functions

      - name: Type-check
        run: npx --prefix functions tsc --noEmit

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Write dev .env
        env:
          FUNCTIONS_ENV: ${{ secrets.FUNCTIONS_ENV_DEV }}
        run: printf '%s' "$FUNCTIONS_ENV" > functions/.env.development

      - name: Write dev service account key
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
        run: |
          printf '%s' "$FIREBASE_SA" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy functions to dev
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
        run: firebase deploy --only functions --project coffix-app-dev --non-interactive
