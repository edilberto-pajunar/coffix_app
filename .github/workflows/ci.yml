name: CI

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "lib/**"
      - "test/**"
      - "android/**"
      - "ios/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".env"
      - ".env.dev"
      - ".github/workflows/ci.yml"
      - "functions/**"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "lib/**"
      - "test/**"
      - "android/**"
      - "ios/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".env"
      - ".env.dev"
      - ".github/workflows/ci.yml"
      - "functions/**"
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write dev env file
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: printf '%s' "$ENV_DEV" > .env.dev

      - name: Write prod env file
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: printf '%s' "$ENV_PROD" > .env

      - name: Write firebase_options_dev.dart
        env:
          FIREBASE_OPTIONS_DEV: ${{ secrets.FIREBASE_OPTIONS_DEV }}
        run: printf '%s' "$FIREBASE_OPTIONS_DEV" > lib/firebase_options_dev.dart

      - name: Write firebase_options_prod.dart
        env:
          FIREBASE_OPTIONS_PROD: ${{ secrets.FIREBASE_OPTIONS_PROD }}
        run: printf '%s' "$FIREBASE_OPTIONS_PROD" > lib/firebase_options_prod.dart

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-warnings

      # ADD IF THERE IS ACTUAL TESTING ALREADY
      # - name: Run tests
      #   run: flutter test --coverage

      # - name: Check formatting
      #   run: dart format --output=none --set-exit-if-changed .

  functions:
    name: Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm --prefix functions ci

      - name: Build (TypeScript compile)
        run: npm --prefix functions run build
