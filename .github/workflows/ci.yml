name: CI

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "lib/**"
      - "test/**"
      - "android/**"
      - "ios/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".env"
      - ".env.dev"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "lib/**"
      - "test/**"
      - "android/**"
      - "ios/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".env"
      - ".env.dev"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write dev env file
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: printf '%s' "$ENV_DEV" > .env.dev

      - name: Write prod env file
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: printf '%s' "$ENV_PROD" > .env

      - name: Write firebase_options_dev.dart
        env:
          FIREBASE_OPTIONS_DEV: ${{ secrets.FIREBASE_OPTIONS_DEV }}
        run: printf '%s' "$FIREBASE_OPTIONS_DEV" > lib/firebase_options_dev.dart

      - name: Write firebase_options_prod.dart
        env:
          FIREBASE_OPTIONS_PROD: ${{ secrets.FIREBASE_OPTIONS_PROD }}
        run: printf '%s' "$FIREBASE_OPTIONS_PROD" > lib/firebase_options_prod.dart

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-warnings

      # - name: Check formatting
      #   run: dart format --output=none --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write dev env file
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: printf '%s' "$ENV_DEV" > .env.dev

      - name: Write prod env file
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: printf '%s' "$ENV_PROD" > .env

      - name: Write firebase_options_dev.dart
        env:
          FIREBASE_OPTIONS_DEV: ${{ secrets.FIREBASE_OPTIONS_DEV }}
        run: printf '%s' "$FIREBASE_OPTIONS_DEV" > lib/firebase_options_dev.dart

      - name: Write firebase_options_prod.dart
        env:
          FIREBASE_OPTIONS_PROD: ${{ secrets.FIREBASE_OPTIONS_PROD }}
        run: printf '%s' "$FIREBASE_OPTIONS_PROD" > lib/firebase_options_prod.dart

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test --coverage

  build_android_dev:
    name: Build Android (dev)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true


      - name: Clean dependencies
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Write dev env file
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: printf '%s' "$ENV_DEV" > .env.dev

      - name: Write prod env file
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: printf '%s' "$ENV_PROD" > .env

      - name: Write firebase_options_dev.dart
        env:
          FIREBASE_OPTIONS_DEV: ${{ secrets.FIREBASE_OPTIONS_DEV }}
        run: printf '%s' "$FIREBASE_OPTIONS_DEV" > lib/firebase_options_dev.dart

      - name: Write firebase_options_prod.dart
        env:
          FIREBASE_OPTIONS_PROD: ${{ secrets.FIREBASE_OPTIONS_PROD }}
        run: printf '%s' "$FIREBASE_OPTIONS_PROD" > lib/firebase_options_prod.dart

      - name: Write google-services.json (dev)
        env:
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON_DEV" > android/app/src/dev/google-services.json

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (dev debug)
        run: |
          flutter build apk \
            --debug \
            --flavor dev \
            --target lib/main_dev.dart

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-dev-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          retention-days: 7

  build_android_prod:
    name: Build Android (prod)
    runs-on: ubuntu-latest
    needs: analyze
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean dependencies
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Write dev env file
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: printf '%s' "$ENV_DEV" > .env.dev

      - name: Write prod env file
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: printf '%s' "$ENV_PROD" > .env

      - name: Write firebase_options_dev.dart
        env:
          FIREBASE_OPTIONS_DEV: ${{ secrets.FIREBASE_OPTIONS_DEV }}
        run: printf '%s' "$FIREBASE_OPTIONS_DEV" > lib/firebase_options_dev.dart

      - name: Write firebase_options_prod.dart
        env:
          FIREBASE_OPTIONS_PROD: ${{ secrets.FIREBASE_OPTIONS_PROD }}
        run: printf '%s' "$FIREBASE_OPTIONS_PROD" > lib/firebase_options_prod.dart

      - name: Write google-services.json (prod)
        env:
          GOOGLE_SERVICES_JSON_PROD: ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON_PROD" > android/app/src/prod/google-services.json

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (prod release)
        run: |
          flutter build apk \
            --release \
            --flavor prod \
            --target lib/main_prod.dart

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-prod-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 14
